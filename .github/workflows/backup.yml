name: Daily Turso backup

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:       # allow manual runs

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install Turso CLI
        run: curl -sSfL https://get.tur.so/install.sh | bash

      - name: Authenticate Turso
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/turso"
          printf '{"token":"%s"}' "$TURSO_API_TOKEN" > "$HOME/.config/turso/settings.json"

      - name: Dump database
        run: |
          export PATH="$HOME/.turso:$PATH"
          mkdir -p backups
          STAMP=$(date -u +%Y-%m-%d)
          turso db shell sweatsheet-restore ".dump" > "backups/sweatsheet-${STAMP}.sql"
          # Sanity check — abort if dump looks empty / errored
          if ! grep -q "CREATE TABLE" "backups/sweatsheet-${STAMP}.sql"; then
            echo "Dump failed — content:"
            cat "backups/sweatsheet-${STAMP}.sql"
            exit 1
          fi
          gzip "backups/sweatsheet-${STAMP}.sql"
          ls -lh backups/

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: sweatsheet-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          retention-days: 90
