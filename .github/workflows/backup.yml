name: Daily Turso backup

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:       # allow manual runs

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Dump database
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          mkdir -p backups
          STAMP=$(date -u +%Y-%m-%d)
          node scripts/backup.mjs > "backups/sweatsheet-${STAMP}.sql"
          if ! grep -q "CREATE TABLE" "backups/sweatsheet-${STAMP}.sql"; then
            echo "Dump failed — content:"
            cat "backups/sweatsheet-${STAMP}.sql"
            exit 1
          fi
          gzip "backups/sweatsheet-${STAMP}.sql"
          ls -lh backups/

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: sweatsheet-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          retention-days: 90
